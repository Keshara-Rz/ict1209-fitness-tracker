<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - FitPulse</title>
</head>
<body>
    <!-- Navigation -->
    <nav>
        <div>
            <a href="index.html">
                <span>Fit</span><span>Pulse</span>
            </a>
        </div>
    </nav>

    <!-- Main Auth Content -->
    <main>
        <div>
            <div>
                <div>
                    <div>
                        <div>
                            <h2>WELCOME BACK</h2>
                            <p>Enter your credentials to access your dashboard.</p>
                        </div>

                        <form id="loginForm">
                            <div>
                                <label>Email Address</label>
                                <div>
                                    <input type="email" required>
                                </div>
                            </div>
                            
                            <div>
                                <div>
                                    <label>Password</label>
                                
                                </div>
                                <div>
                                    <input type="password" required>
                                </div>
                            </div>

                            <div>
                                <input type="checkbox" id="rememberMe">
                                <label for="rememberMe">Remember me on this device</label>
                            </div>
                            
                            <button type="submit">
                                Initialize Session
                            </button>
                            
                            <div>
                                Don't have an account? <a href="signup.html">Sign Up Now</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
