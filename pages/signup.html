<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - FitPulse</title>
</head>
<body>
    <!-- Navigation -->
    <nav>
        <div>
            <a href="index.html">
                <span>Fit</span><span>Pulse</span>
            </a>
        </div>
    </nav>

    <!-- Main Auth Content -->
    <main>
        <div>
            <div>
                <div>
                    <div>
                        <div>
                            <h2>CREATE PROFILE</h2>
                            <p>Join the future of fitness tracking today.</p>
                        </div>

                        <form id="signupForm">
                            <div>
                                <div>
                                    <label>First Name</label>
                                    <div>
                                        <input type="text" required>
                                    </div>
                                </div>
                                <div>
                                    <label>Last Name</label><br>
                                    <input type="text" required>
                                </div>
                            </div>

                            <div>
                                <label>Email Address</label>
                                <div>
                                    <input type="email" required>
                                </div>
                            </div>
                            
                            <div>
                                <div>
                                    <label>Password</label>
                                    <div>
                                        <input type="password" required>
                                    </div>
                                </div>
                                <div>
                                    <label>Confirm</label><br>
                                    <input type="password" required>
                                </div>
                            </div>

                            <div>
                                <input type="checkbox" id="termsCheck" required>
                                <label for="termsCheck">
                                    I agree to share my email with FitPulse.
                                </label>
                            </div>
                            
                            <button type="submit">
                                Register Account
                            </button>
                            
                            <div>
                                Already have a profile? <a href="login.html">Login Here</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
